name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-unix:
    name: Package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: macos-14
            platform: macos-arm64
    steps:
      - name: Check out
        uses: actions/checkout@v6.0.2

      - name: Install Linux toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config patchelf zip

      - name: Install macOS pkg-config
        if: runner.os == 'macOS'
        run: brew install pkg-config

      - name: Install SDL3
        id: sdl
        uses: libsdl-org/setup-sdl@4ebea449684c989388fe6bcea0460e300d13a5ae
        with:
          version: 3.4.2
          build-type: Release
          sdl-test: false

      - name: Package release asset
        id: package
        run: |
          export PKG_CONFIG_PATH="${{ steps.sdl.outputs.prefix }}/lib/pkgconfig"
          export PATH="${{ steps.sdl.outputs.prefix }}/bin:$PATH"
          asset_path="$(scripts/package_release.sh "${{ matrix.platform }}" "${GITHUB_REF_NAME}")"
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.platform }}
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  package-windows:
    name: Package (windows-x64)
    runs-on: windows-2022
    steps:
      - name: Normalize checkout line endings
        run: git config --global core.autocrlf input

      - name: Check out
        uses: actions/checkout@v6.0.2

      - name: Install MSYS2 toolchain
        uses: msys2/setup-msys2@v2.30.0
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-sdl3
            zip

      - name: Package release asset
        id: package
        shell: msys2 {0}
        env:
          MAKE: mingw32-make
        run: |
          asset_path="$(scripts/package_release.sh "windows-x64" "${GITHUB_REF_NAME}")"
          asset_path="$(cygpath -m "$asset_path")"
          printf 'asset_path=%s\n' "$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v7.0.0
        with:
          name: windows-x64
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs:
      - package-unix
      - package-windows
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          shopt -s nullglob
          assets=(release-assets/*)
          if ((${#assets[@]} == 0)); then
            echo "No packaged assets were downloaded." >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$tag" \
              --generate-notes
          fi
