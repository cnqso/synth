name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            shell: bash
            archive: tar.gz
          - os: macos-latest
            platform: macos
            shell: bash
            archive: tar.gz
          - os: windows-latest
            platform: windows-x64
            shell: msys2 {0}
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-SDL3
            zip

      - if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl3-dev pkg-config

      - if: matrix.os == 'macos-latest'
        run: |
          brew install sdl3 pkg-config

      - name: Build
        shell: ${{ matrix.shell }}
        run: make

      - name: Package Unix Release
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czf "dist/cnqsosynth-${{ matrix.platform }}.tar.gz" cnqsosynth Nintendo-DS-BIOS.ttf

      - name: Package Windows Release
        if: matrix.archive == 'zip'
        shell: ${{ matrix.shell }}
        run: |
          mkdir -p dist
          zip -j "dist/cnqsosynth-${{ matrix.platform }}.zip" cnqsosynth.exe Nintendo-DS-BIOS.ttf

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
